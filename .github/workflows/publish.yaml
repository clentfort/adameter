name: Publish Packages

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - '.github/workflows/publish.yaml'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  discover-packages:
    runs-on: ubuntu-latest
    outputs:
      has_packages: ${{ steps.discover.outputs.has_packages }}
      packages: ${{ steps.discover.outputs.packages }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Discover publishable packages
        id: discover
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const packagesDir = path.join(process.cwd(), 'packages');
          const outputPath = process.env.GITHUB_OUTPUT;

          if (!fs.existsSync(packagesDir)) {
            fs.appendFileSync(outputPath, 'has_packages=false\n');
            fs.appendFileSync(outputPath, 'packages=[]\n');
            process.exit(0);
          }

          const packageDirs = fs
            .readdirSync(packagesDir, { withFileTypes: true })
            .filter((entry) => entry.isDirectory())
            .map((entry) => entry.name);

          const publishablePackages = [];

          for (const dirName of packageDirs) {
            const packagePath = path.join(packagesDir, dirName);
            const packageJsonPath = path.join(packagePath, 'package.json');

            if (!fs.existsSync(packageJsonPath)) {
              continue;
            }

            const packageJson = JSON.parse(
              fs.readFileSync(packageJsonPath, 'utf8'),
            );

            if (packageJson.private === true) {
              continue;
            }

            if (!packageJson.name) {
              continue;
            }

            publishablePackages.push({
              name: packageJson.name,
              path: `packages/${dirName}`,
            });
          }

          fs.appendFileSync(
            outputPath,
            `has_packages=${publishablePackages.length > 0}\n`,
          );
          fs.appendFileSync(
            outputPath,
            `packages=${JSON.stringify(publishablePackages)}\n`,
          );
          EOF

  publish:
    needs: discover-packages
    if: needs.discover-packages.outputs.has_packages == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover-packages.outputs.packages) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package changes since last release
        id: changed
        run: |
          PACKAGE_NAME='${{ matrix.package.name }}'
          PACKAGE_PATH='${{ matrix.package.path }}'

          LAST_TAG=$(git tag --list "${PACKAGE_NAME}-v*" --sort=-version:refname | head -n 1)

          if [[ -z "$LAST_TAG" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$LAST_TAG"..HEAD -- "$PACKAGE_PATH"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run package typecheck
        if: steps.changed.outputs.changed == 'true'
        run: pnpm --filter '${{ matrix.package.name }}' typecheck

      - name: Run package tests with coverage
        if: steps.changed.outputs.changed == 'true'
        run: pnpm --filter '${{ matrix.package.name }}' test --run --coverage

      - name: Determine npm release mode
        if: steps.changed.outputs.changed == 'true'
        id: npm_auth
        env:
          HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
          PACKAGE_NAME: ${{ matrix.package.name }}
          PACKAGE_PATH: ${{ matrix.package.path }}
        run: |
          if [[ "$HAS_NPM_TOKEN" == 'true' ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "mode=token" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if (cd "$PACKAGE_PATH" && npm view "$PACKAGE_NAME" version >/dev/null 2>&1); then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "mode=trusted-publishing" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Skipping npm release::No NPM_TOKEN configured and $PACKAGE_NAME does not exist on npm yet."
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "mode=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Release package (token)
        if: steps.changed.outputs.changed == 'true' && steps.npm_auth.outputs.release == 'true' && steps.npm_auth.outputs.mode == 'token'
        run: pnpm --filter '${{ matrix.package.name }}' release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Release package (trusted publishing)
        if: steps.changed.outputs.changed == 'true' && steps.npm_auth.outputs.release == 'true' && steps.npm_auth.outputs.mode == 'trusted-publishing'
        run: pnpm --filter '${{ matrix.package.name }}' release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
